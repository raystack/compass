version: v2
inputs:
  - git_repo: https://github.com/raystack/proton.git
    ref: 8516e5e694d6b029a524da2ce42d3e8a5be9f339
    paths:
      - raystack/compass
managed:
  enabled: true
  override:
    - file_option: go_package
      path: raystack/compass/v1beta1/service.proto
      value: github.com/raystack/compass/gen/raystack/compass/v1beta1;compassv1beta1
plugins:
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: gen
    opt:
      - paths=source_relative
  - remote: buf.build/connectrpc/go:v1.18.1
    out: gen
    opt:
      - paths=source_relative
